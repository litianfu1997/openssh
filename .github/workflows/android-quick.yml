name: Android Quick Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/android-quick.yml'
      - '.github/workflows/release.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'src-tauri/**'

permissions:
  contents: read

concurrency:
  group: android-quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-quick:
    name: Build Android Quick (arm64 debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          if [ ! -d "${ANDROID_HOME}/ndk/27.0.12077973" ]; then
            sdkmanager --install "ndk;27.0.12077973"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npx tauri android init

      - name: Build Android debug APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --debug

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-artifacts
          find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" \( -name "*arm64-v8a*debug*.apk" -o -name "*debug*.apk" \) | while read -r file; do
            cp "$file" "android-artifacts/$(basename "$file")"
          done

          if [ -z "$(find android-artifacts -maxdepth 1 -type f -name "*.apk" -print -quit)" ]; then
            echo "No Android APK artifacts were found after build."
            exit 1
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynxshell-android-quick-arm64-debug
          path: android-artifacts/*.apk
          retention-days: 7
